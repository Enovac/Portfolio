<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      //
      // This 404.html is served by GitHub Pages for unknown routes.
      // Redirect to index.html with the original route encoded.
      (function (l) {
        var pathSegmentsToKeep = 1; // 1 for repo pages: https://<user>.github.io/<repo>/

        l.replace(
          l.protocol +
            "//" +
            l.host +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .split("/")
              .slice(1 + pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search
              ? "&" + l.search.slice(1).replace(/&/g, "~and~")
              : "") +
            l.hash,
        );
      })(window.location);
    </script>
  </head>

  <body>
    <p>Redirecting...</p>
  </body>
</html>
